<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PaperKalshi · Kalshi Paper Trading</title>
<style>
  :root{
    --bg:#0b0c0f; --panel:#14161c; --panel-2:#191c23; --border:#252932;
    --text:#e7e9ee; --muted:#8b919e; --accent:#5b8cff;
    --green:#25c281; --red:#ff5d5d; --amber:#e9b949;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.45}
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);
          position:sticky;top:0;background:rgba(11,12,15,.9);backdrop-filter:blur(8px);z-index:5}
  .topbar h1{font-size:15px;font-weight:650;margin:0}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:7px}
  .chips{display:flex;gap:10px;margin-left:6px;flex-wrap:wrap}
  .chip{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:6px 12px;min-width:104px}
  .chip .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .chip .v{font-family:var(--mono);font-size:15px;font-weight:600;margin-top:2px}
  .spacer{flex:1}
  .btn{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;
       padding:7px 13px;cursor:pointer;font-size:12.5px}
  .btn:hover{border-color:#3a4150}
  .btn.ghost{background:transparent}
  .btn.icon{padding:6px 8px;display:inline-flex;align-items:center;justify-content:center;line-height:0;color:var(--muted)}
  .btn.icon:hover{color:var(--text)}
  .btn.icon svg .pane{opacity:1;transition:opacity .15s}
  body.collapsed .btn.icon svg .pane{opacity:0}
  .pos{color:var(--green)} .neg{color:var(--red)} .muted{color:var(--muted)}
  .layout{display:grid;grid-template-columns:1fr 452px;gap:14px;padding:14px 20px 40px;align-items:start}
  body.collapsed .layout{grid-template-columns:1fr}
  body.collapsed .right{display:none}
  .right table td,.right table th{padding:7px 9px}
  .mkt .team{font-weight:600;font-family:var(--sans)}
  .mkt .sub2{font-size:10.5px;color:var(--muted);font-family:var(--sans);max-width:160px;
             overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px}
  .card>.hd{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border)}
  .card>.hd h3{margin:0;font-size:13px;font-weight:600}
  .card>.hd .sub{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:right;color:var(--muted);font-weight:500;padding:7px 12px;font-size:10.5px;
     text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--border)}
  th.l,td.l{text-align:left}
  td{padding:8px 12px;border-bottom:1px solid #1c1f26;font-family:var(--mono);text-align:right;white-space:nowrap}
  tbody tr:hover{background:var(--panel-2)}
  tr.gtop td{border-top:2px solid #20242c}
  .team{font-family:var(--sans);font-weight:600}
  .ba{font-family:var(--mono)} .ba b{color:var(--text)} .ba i{color:var(--muted);font-style:normal}
  .px{display:inline-block;border:1px solid var(--border);background:var(--panel-2);border-radius:7px;
      padding:4px 10px;cursor:pointer;color:#cfe0ff;font-family:var(--mono);font-size:12px}
  .px:hover{border-color:var(--accent);background:rgba(91,140,255,.12)}
  .boardwrap,.poswrap,.blotwrap{max-height:none;overflow:auto}
  .boardwrap{max-height:calc(100vh - 200px);scrollbar-width:none}
  .boardwrap::-webkit-scrollbar{display:none}
  /* category tabs */
  .catbar{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg)}
  .catbar .cat{background:transparent;border:0;color:var(--muted);padding:12px 15px;cursor:pointer;font-size:13.5px;
               font-weight:500;border-bottom:2px solid transparent;white-space:nowrap}
  .catbar .cat:hover{color:var(--text)}
  .catbar .cat.active{color:var(--text);border-bottom-color:var(--accent)}
  .gc-more{font-size:11px;color:var(--muted);padding:5px 0 0}
  /* game cards */
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;padding:14px}
  .game-card{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;flex-direction:column}
  .gc-head{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .gc-title{font-size:15px;font-weight:650;margin:6px 0 1px}
  .gc-status{font-size:11.5px;color:var(--muted);margin-bottom:9px}
  .gc-status .live{color:var(--red);font-weight:600}
  .gc-team{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 0}
  .gc-team .nm{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:7px}
  .gc-team .held{font-family:var(--mono);font-size:10px;color:#9bb6ff;border:1px solid #2c3550;background:rgba(91,140,255,.10);border-radius:6px;padding:1px 6px}
  .gc-price{font-family:var(--mono);font-weight:650;font-size:14px;color:#cfe0ff;border:1px solid var(--border);
            background:var(--panel);border-radius:999px;padding:7px 0;cursor:pointer;min-width:74px;text-align:center}
  .gc-price:hover{border-color:var(--accent);background:rgba(91,140,255,.13)}
  .gc-price.closed{color:var(--muted);cursor:default;border-style:dashed}
  .gc-price.closed:hover{border-color:var(--border);background:var(--panel)}
  .gc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:9px;
           border-top:1px solid var(--border);font-size:11.5px;color:var(--muted)}
  .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-family:var(--sans)}
  .badge.yes{background:rgba(91,140,255,.15);color:#9bb6ff}
  .badge.no{background:rgba(233,185,73,.15);color:#f0cd7a}
  .badge.settle{background:rgba(139,145,158,.16);color:#aeb4bf}
  .empty{color:var(--muted);padding:22px;text-align:center;font-size:12.5px}
  .x{color:var(--muted);cursor:pointer;border:1px solid var(--border);background:var(--panel-2);border-radius:6px;padding:3px 9px;font-size:11px}
  .x:hover{border-color:var(--red);color:#ffb0b0}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:20}
  .overlay.show{display:flex}
  .modal{width:380px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
  .modal h3{margin:0 0 2px;font-size:15px}
  .modal .mk{color:var(--muted);font-size:12px;margin-bottom:14px}
  .seg{display:flex;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px}
  .seg button{flex:1;background:transparent;border:0;color:var(--muted);padding:9px 0;cursor:pointer;font-size:13px;font-weight:600}
  .seg button.active.yes{background:var(--accent);color:#0b0c0f}
  .seg button.active.no{background:var(--amber);color:#0b0c0f}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
       border-radius:8px;padding:9px 11px;font-family:var(--mono);font-size:14px}
  .summary{background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:13px;font-family:var(--mono);font-size:12.5px}
  .summary .r{display:flex;justify-content:space-between;padding:2px 0}
  .err{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px}
  .actions{display:flex;gap:9px}
  .actions .btn{flex:1;text-align:center}
  .confirm{background:var(--accent);color:#0b0c0f;border:0;font-weight:650}
  .confirm.no{background:var(--amber)}
</style>
</head>
<body>
  <div class="topbar">
    <h1><span class="dot" id="dot"></span>PaperKalshi</h1>
    <div class="chips" id="chips"></div>
    <div class="spacer"></div>
    <button class="btn icon" id="toggle" title="Hide positions panel" aria-label="Toggle positions panel">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
        <path class="pane" d="M15 3 h4 a2 2 0 0 1 2 2 v14 a2 2 0 0 1 -2 2 h-4 Z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="btn" id="reset">Reset account</button>
  </div>

  <div class="catbar" id="catbar"></div>

  <div class="layout">
    <div class="card">
      <div class="hd"><h3 id="board_title">MLB markets</h3><span class="sub" id="board_sub">loading…</span></div>
      <div class="boardwrap">
        <div id="board" class="board-grid"></div>
      </div>
    </div>

    <div class="right">
      <div class="card" style="margin-bottom:14px">
        <div class="hd"><h3>Positions</h3><span class="sub" id="pos_sub"></span></div>
        <div class="poswrap"><table>
          <thead><tr><th class="l">Market</th><th>Qty</th><th>Avg</th><th>Mark</th><th>uP&amp;L</th><th></th></tr></thead>
          <tbody id="positions"></tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="hd"><h3>Blotter</h3><span class="sub">recent fills</span></div>
        <div class="blotwrap" style="max-height:300px"><table>
          <thead><tr><th class="l">Action</th><th class="l">Market</th><th>Qty</th><th>Price</th><th>Realized</th></tr></thead>
          <tbody id="blotter"></tbody>
        </table></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h3 id="m_team"></h3>
      <div class="mk" id="m_match"></div>
      <div class="seg" id="m_seg">
        <button class="yes active" data-side="yes">Back YES</button>
        <button class="no" data-side="no">Fade (NO)</button>
      </div>
      <div class="field"><label>Quantity (contracts)</label><input id="m_qty" type="number" min="1" step="1" value="10"></div>
      <div class="summary" id="m_summary"></div>
      <div class="err" id="m_err"></div>
      <div class="actions">
        <button class="btn" id="m_cancel">Cancel</button>
        <button class="confirm btn" id="m_confirm">Buy</button>
      </div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const money = v => (v<0?"-$":"$") + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const sgn = v => (v>=0?"+":"") + money(v).replace("$", v<0?"-$":"$").replace("--","-");
const pnl = v => `<span class="${v>0?'pos':(v<0?'neg':'')}">${(v>=0?'+':'')}${money(v)}</span>`;
const cls = v => v>0?"pos":(v<0?"neg":"");
const cents = c => (c==null?"–":c+"¢");
const fmtVol = v => v>=1e6 ? (v/1e6).toFixed(1)+"M" : (v>=1e3 ? Math.round(v/1e3)+"k" : v);

// MLB game date/time is encoded in the event ticker: KXMLBGAME-26JUN271905<AWAY><HOME>.
function gameTime(ev){
  const m = (ev||"").match(/KXMLBGAME-(\d{2})([A-Z]{3})(\d{2})(\d{2})(\d{2})/);
  if(!m) return "";
  const mon = m[2][0] + m[2].slice(1).toLowerCase();
  let h = parseInt(m[4],10); const mm = m[5]; const ap = h>=12 ? "PM":"AM"; h = h%12 || 12;
  return `${mon} ${parseInt(m[3],10)} · ${h}:${mm} ${ap}`;
}
function fmtDate(s){
  if(!s) return "";
  try{ const d=new Date(s), now=new Date(), o={month:'short',day:'numeric'};
       if(d.getFullYear()!==now.getFullYear()) o.year='numeric';
       return d.toLocaleDateString(undefined,o); }catch(e){ return ""; }
}

let BOARD = {};        // ticker -> outcome (for the trade ticket)
let LASTBOARD = [];    // last cards array (re-rendered when account updates)
let POSQTY = {};       // "ticker:side" -> contracts held
let CATEGORY = "mlb", CATLABEL = "MLB";
let modal = {ticker:null, side:"yes"};
let polling = true;

async function loadCategories(){
  try{
    const d = await (await fetch("/api/categories")).json();
    const cur = d.categories.find(c => c.key===CATEGORY); if(cur) CATLABEL = cur.label;
    $("catbar").innerHTML = d.categories.map(c =>
      `<button class="cat${c.key===CATEGORY?' active':''}" data-key="${c.key}" data-label="${c.label}">${c.label}</button>`).join("");
    $("catbar").querySelectorAll("button").forEach(b =>
      b.addEventListener("click", ()=> setCategory(b.dataset.key, b.dataset.label)));
  }catch(e){}
}
function setCategory(key, label){
  if(key===CATEGORY) return;
  CATEGORY = key; CATLABEL = label || key;
  $("catbar").querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.key===key));
  $("board_sub").textContent = "loading…";
  $("board").innerHTML = `<div class="empty">Loading ${CATLABEL}…</div>`;
  loadMarkets();
}

async function loadMarkets(){
  try{
    const d = await (await fetch("/api/markets?category="+encodeURIComponent(CATEGORY))).json();
    BOARD = {};
    (d.cards||[]).forEach(c => c.outcomes.forEach(o => BOARD[o.ticker] = o));
    LASTBOARD = d.cards || [];
    renderBoard(LASTBOARD);
    $("dot").style.background = "var(--green)";
  }catch(e){ $("board_sub").textContent = "market data unavailable"; $("dot").style.background="var(--red)"; }
}

function heldTag(o, side){ const n = POSQTY[o.ticker+":"+side]||0; return n ? `<span class="held">×${n}</span>` : ""; }
function pill(o, side){
  const ask = side==="yes" ? o.yes_ask_c : o.no_ask_c;
  if(o.tradeable && ask!=null && ask>=1 && ask<=99)
    return `<span class="gc-price" onclick="openTicket('${o.ticker}','${side}')">${ask}¢</span>`;
  const last = side==="yes" ? o.last_c : (o.last_c!=null ? 100-o.last_c : null);
  return `<span class="gc-price closed">${last!=null ? last+'¢' : '—'}</span>`;
}
function teamRow(o, side, label){
  return `<div class="gc-team"><span class="nm">${label}${heldTag(o,side)}</span>${pill(o,side)}</div>`;
}

function renderBoard(cards){
  $("board_title").textContent = CATLABEL === "MLB" ? "MLB markets" : CATLABEL;
  $("board_sub").textContent = `${cards.length} markets · live`;
  if(!cards.length){ $("board").innerHTML = `<div class="empty">No open markets in this category right now.</div>`; return; }
  $("board").innerHTML = cards.map(c=>{
    const sub = gameTime(c.id) || fmtDate(c.close_time) || "—";
    const shown = c.outcomes.slice(0,4);
    let rows, more = "";
    if(c.market_count===1 && shown.length===1){
      // A single binary market: show both sides so you can back OR fade it.
      const o = shown[0];
      const yesLabel = (o.team && o.team.toLowerCase()!=="yes") ? o.team : "Yes";
      rows = teamRow(o,"yes",yesLabel) + teamRow(o,"no","No");
    } else {
      rows = shown.map(o => teamRow(o,"yes", o.team || "Yes")).join("");
      if(c.market_count>shown.length) more = `<div class="gc-more">+${c.market_count-shown.length} more outcomes</div>`;
    }
    return `<div class="game-card">
      <div class="gc-head">${CATLABEL}</div>
      <div class="gc-title">${c.title}</div>
      <div class="gc-status">${sub}</div>
      ${rows}${more}
      <div class="gc-foot"><span>${fmtVol(c.vol)} vol</span><span>${c.market_count} market${c.market_count>1?'s':''}</span></div>
    </div>`;
  }).join("");
}

async function loadAccount(){
  try{
    const a = await (await fetch("/api/account")).json();
    renderAccount(a);
  }catch(e){}
}

function renderAccount(a){
  POSQTY = {};
  a.positions.forEach(p => POSQTY[p.ticker+":"+p.side] = p.contracts);
  if(LASTBOARD.length) renderBoard(LASTBOARD);
  const chips = [
    {k:"Cash", v:money(a.cash)},
    {k:"Equity", v:money(a.equity)},
    {k:"Total P&L", v:(a.total_pnl>=0?'+':'')+money(a.total_pnl), c:cls(a.total_pnl)},
    {k:"Realized", v:(a.realized_pnl>=0?'+':'')+money(a.realized_pnl), c:cls(a.realized_pnl)},
    {k:"Unrealized", v:(a.unrealized_pnl>=0?'+':'')+money(a.unrealized_pnl), c:cls(a.unrealized_pnl)},
  ];
  $("chips").innerHTML = chips.map(c=>`<div class="chip"><div class="k">${c.k}</div><div class="v ${c.c||''}">${c.v}</div></div>`).join("");
  // positions
  $("pos_sub").textContent = a.positions.length ? `${a.positions.length} open` : "";
  $("positions").innerHTML = a.positions.length ? a.positions.map(p=>`<tr>
      <td class="l"><div class="mkt"><span class="team">${p.team}</span> <span class="badge ${p.side}">${p.side.toUpperCase()}</span><div class="sub2">${p.matchup}</div></div></td>
      <td>${p.contracts}</td><td>${p.avg_price_c}¢</td><td>${p.mark_c==null?'–':p.mark_c+'¢'}</td>
      <td class="${cls(p.unrealized)}">${(p.unrealized>=0?'+':'')}${money(p.unrealized)}</td>
      <td><button class="x" onclick="closePos('${p.ticker}','${p.side}',${p.contracts})">Close</button></td>
    </tr>`).join("") : `<tr><td colspan="6" class="empty">No open positions. Click a price to back a team.</td></tr>`;
  // blotter
  $("blotter").innerHTML = a.fills.length ? a.fills.map(f=>{
    const act = f.action==='settle' ? `<span class="badge settle">settled</span>`
      : `<span class="badge ${f.side}">${f.action} ${f.side.toUpperCase()}</span>`;
    const rp = f.action==='buy' ? "" : pnl(f.realized);
    return `<tr><td class="l">${act}</td><td class="l"><div class="mkt"><span class="team">${f.team}</span><div class="sub2">${f.matchup}</div></div></td>
      <td>${f.count}</td><td>${f.price_c}¢</td><td>${rp}</td></tr>`;
  }).join("") : `<tr><td colspan="5" class="empty">No fills yet.</td></tr>`;
}

function openTicket(ticker, side){
  const m = BOARD[ticker]; if(!m) return;
  modal = {ticker, side};
  const label = m.team || "Yes";
  $("m_team").textContent = label;
  $("m_match").textContent = m.matchup + (m.close_time ? " · closes " + fmtDate(m.close_time) : "");
  setSide(side);
  $("m_qty").value = 10;
  $("m_err").textContent = "";
  $("overlay").classList.add("show");
  polling = false;
  updateSummary();
}
function setSide(side){
  modal.side = side;
  $("m_seg").querySelectorAll("button").forEach(b=>b.classList.toggle("active", b.dataset.side===side));
  const m = BOARD[modal.ticker]; const label = (m.team || "Yes");
  $("m_confirm").className = "confirm btn" + (side==="no"?" no":"");
  $("m_confirm").textContent = side==="yes" ? `Buy YES (${label})` : `Buy NO (fade ${label})`;
  updateSummary();
}
function updateSummary(){
  const m = BOARD[modal.ticker]; if(!m) return;
  const qty = Math.max(0, parseInt($("m_qty").value||"0",10));
  const price = modal.side==="yes" ? m.yes_ask_c : m.no_ask_c;
  if(price==null){ $("m_summary").innerHTML = `<div class="r"><span>No liquidity on that side.</span></div>`; return; }
  // mirror Kalshi taker fee: ceil(0.07 * C * p * (1-p)) dollars
  const p = price/100, fee = Math.ceil(0.07*qty*p*(1-p)*100);
  const cost = qty*price + fee;
  $("m_summary").innerHTML = `
    <div class="r"><span>Price (ask)</span><span>${price}¢</span></div>
    <div class="r"><span>Quantity</span><span>${qty}</span></div>
    <div class="r"><span>Est. fee</span><span>${money(fee/100)}</span></div>
    <div class="r"><span><b>Est. cost</b></span><span><b>${money(cost/100)}</b></span></div>
    <div class="r muted"><span>Max payout if it wins</span><span>${money(qty)}</span></div>`;
}

async function confirmTrade(){
  const qty = parseInt($("m_qty").value||"0",10);
  if(!(qty>0)){ $("m_err").textContent="Enter a quantity."; return; }
  $("m_confirm").disabled = true;
  try{
    const r = await fetch("/api/trade",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ticker:modal.ticker, side:modal.side, action:"buy", count:qty})});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||("HTTP "+r.status)); }
    const d = await r.json();
    renderAccount(d.account);
    closeModal();
    loadMarkets();
  }catch(e){ $("m_err").textContent = e.message; }
  finally{ $("m_confirm").disabled = false; }
}

async function closePos(ticker, side, count){
  try{
    const r = await fetch("/api/trade",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ticker, side, action:"sell", count})});
    if(!r.ok){ const e=await r.json(); alert(e.detail||("HTTP "+r.status)); return; }
    const d = await r.json(); renderAccount(d.account); loadMarkets();
  }catch(e){ alert(e.message); }
}

function closeModal(){ $("overlay").classList.remove("show"); polling = true; }

$("m_seg").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>setSide(b.dataset.side)));
$("m_qty").addEventListener("input", updateSummary);
$("m_confirm").addEventListener("click", confirmTrade);
$("m_cancel").addEventListener("click", closeModal);
$("overlay").addEventListener("click", e=>{ if(e.target===$("overlay")) closeModal(); });
function applyCollapsed(c, persist){
  document.body.classList.toggle("collapsed", c);
  $("toggle").title = c ? "Show positions panel" : "Hide positions panel";
  if(persist){ try{ localStorage.setItem("paperCollapsed", c ? "1" : "0"); }catch(e){} }
}
$("toggle").addEventListener("click", ()=> applyCollapsed(!document.body.classList.contains("collapsed"), true));
let _saved=false; try{ _saved = localStorage.getItem("paperCollapsed")==="1"; }catch(e){}
applyCollapsed(location.hash==="#compact" || _saved, false);  // #compact = view-only, no persist

$("reset").addEventListener("click", async ()=>{
  if(!confirm("Reset the paper account to $100,000 and clear all positions?")) return;
  const a = await (await fetch("/api/account/reset",{method:"POST"})).json();
  renderAccount(a); loadMarkets();
});

const _qcat = new URLSearchParams(location.search).get("cat"); if(_qcat) CATEGORY = _qcat;
(async ()=>{ await loadCategories(); loadMarkets(); loadAccount(); })();
setInterval(()=>{ if(polling){ loadMarkets(); loadAccount(); } }, 6000);
</script>
</body>
</html>
